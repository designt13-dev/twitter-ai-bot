name: "💬 Smart Reply Bot — 3 مرات يومياً"

on:
  schedule:
    # 10:00 ص الرياض = 07:00 UTC
    - cron: "0 7 * * *"
    # 03:00 م الرياض = 12:00 UTC
    - cron: "0 12 * * *"
    # 09:00 م الرياض = 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  reply-bot:
    name: "🤖 Contextual Reply"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "💬 Run Reply Pipeline"
        env:
          TWITTER_CONSUMER_KEY:    ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:    ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:    ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python -m src.orchestrator --mode reply

      - name: "📋 Upload log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reply-log-${{ github.run_id }}
          path: logs/
          retention-days: 7
