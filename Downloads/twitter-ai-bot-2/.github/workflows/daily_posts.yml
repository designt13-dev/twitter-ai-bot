name: "🤖 Daily AI Posts — 16 تغريدة يومياً"

on:
  schedule:
    # ── 16 وقت يومي (UTC → الرياض UTC+3) ──────────────────
    # 07:00 ص = 04:00 UTC
    - cron: "0 4 * * *"
    # 08:30 ص = 05:30 UTC
    - cron: "30 5 * * *"
    # 10:00 ص = 07:00 UTC
    - cron: "0 7 * * *"
    # 11:30 ص = 08:30 UTC
    - cron: "30 8 * * *"
    # 01:00 م = 10:00 UTC
    - cron: "0 10 * * *"
    # 02:30 م = 11:30 UTC
    - cron: "30 11 * * *"
    # 04:00 م = 13:00 UTC
    - cron: "0 13 * * *"
    # 05:30 م = 14:30 UTC
    - cron: "30 14 * * *"
    # 07:00 م = 16:00 UTC
    - cron: "0 16 * * *"
    # 08:30 م = 17:30 UTC
    - cron: "30 17 * * *"
    # 09:30 م = 18:30 UTC
    - cron: "30 18 * * *"
    # 10:30 م = 19:30 UTC
    - cron: "30 19 * * *"
    # 11:00 م = 20:00 UTC
    - cron: "0 20 * * *"
    # 11:30 م = 20:30 UTC
    - cron: "30 20 * * *"
    # 12:00 ص = 21:00 UTC
    - cron: "0 21 * * *"
    # 01:00 ص = 22:00 UTC
    - cron: "0 22 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "نوع التشغيل"
        required: false
        default: "post"
        type: choice
        options:
          - post
          - reply
          - engage
          - full

jobs:
  post-tweet:
    name: "📢 نشر تغريدة"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "🚀 Run Post Pipeline"
        env:
          TWITTER_CONSUMER_KEY:        ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET:     ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:        ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python -m src.orchestrator --mode post --n 1

      - name: "📋 Upload log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-log-${{ github.run_id }}
          path: logs/
          retention-days: 7
