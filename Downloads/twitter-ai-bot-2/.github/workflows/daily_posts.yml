name: "🤖 Daily AI Posts — 8 تغريدات يومياً"

on:
  schedule:
    # ── 8 أوقات يومية (بتوقيت UTC → توقيت الرياض UTC+3) ──────
    # 09:00 ص الرياض  = 06:00 UTC
    - cron: "0 6 * * *"
    # 10:00 ص الرياض  = 07:00 UTC
    - cron: "0 7 * * *"
    # 12:00 م الرياض  = 09:00 UTC
    - cron: "0 9 * * *"
    # 02:00 م الرياض  = 11:00 UTC
    - cron: "0 11 * * *"
    # 04:00 م الرياض  = 13:00 UTC
    - cron: "0 13 * * *"
    # 06:00 م الرياض  = 15:00 UTC
    - cron: "0 15 * * *"
    # 08:00 م الرياض  = 17:00 UTC
    - cron: "0 17 * * *"
    # 10:00 م الرياض  = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "نوع التشغيل"
        required: false
        default: "post"
        type: choice
        options:
          - post
          - reply
          - engage
          - full

jobs:
  post-tweet:
    name: "📢 نشر تغريدة"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "🚀 Run Post Pipeline"
        env:
          TWITTER_CONSUMER_KEY:    ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:    ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:    ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python -m src.orchestrator --mode post --n 1

      - name: "📋 Upload log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
