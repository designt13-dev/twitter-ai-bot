name: "🌐 Engage Top Accounts — مرة يومياً"

on:
  schedule:
    # 11:00 ص الرياض = 08:00 UTC
    - cron: "0 8 * * *"
    # إعادة اكتشاف الحسابات كل أسبوع (الأحد)
    # - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      rediscover:
        description: "إعادة اكتشاف الحسابات؟"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  engage-bot:
    name: "🔍 Engage & Discover"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "🌐 Run Engage Pipeline"
        env:
          TWITTER_CONSUMER_KEY:    ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:    ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:    ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.rediscover }}" = "true" ]; then
            python -m src.orchestrator --mode engage --rediscover
          else
            python -m src.orchestrator --mode engage
          fi

      - name: "📋 Upload log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engage-log-${{ github.run_id }}
          path: logs/
          retention-days: 7
