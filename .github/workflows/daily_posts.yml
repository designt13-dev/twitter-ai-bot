name: 📢 Daily AI Posts — 5 تغريدات يومية

on:
  schedule:
    # ── 5 أوقات نشر يوميًا (UTC) = توقيت الرياض +3 ──────────
    - cron: '0 6 * * *'     # 9:00 ص  الرياض
    - cron: '30 9 * * *'    # 12:30 م الرياض
    - cron: '0 13 * * *'    # 4:00 م  الرياض
    - cron: '0 17 * * *'    # 8:00 م  الرياض
    - cron: '30 19 * * *'   # 10:30 م الرياض

  # تشغيل يدوي عند الحاجة
  workflow_dispatch:
    inputs:
      force_post:
        description: 'نشر تغريدة الآن'
        required: false
        default: 'true'

jobs:
  post-tweet:
    name: نشر تغريدة إبداعية بصورة
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 تثبيت المتطلبات
        run: pip install -r requirements.txt

      - name: 🚀 بحث + توليد + نشر
        env:
          TWITTER_CONSUMER_KEY:        ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET:     ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:        ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_CLIENT_SECRET:       ${{ secrets.TWITTER_CLIENT_SECRET }}
        run: python -m src.poster

      - name: 💾 حفظ السجلات
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-log-${{ github.run_number }}
          path: logs/bot.log
          retention-days: 14
