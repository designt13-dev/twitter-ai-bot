name: 💬 Reply Bot — ردود تفاعلية يومية

on:
  schedule:
    # ── 3 جلسات × 5 ردود = 15 رد/يوم ─────────────────────
    - cron: '0 7 * * *'     # 10:00 ص الرياض
    - cron: '0 12 * * *'    # 3:00 م  الرياض
    - cron: '0 18 * * *'    # 9:00 م  الرياض

  workflow_dispatch:

jobs:
  reply-bot:
    name: الرد التفاعلي على المجتمع
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 تثبيت المتطلبات
        run: pip install -r requirements.txt

      - name: 💬 تشغيل بوت الردود
        env:
          TWITTER_CONSUMER_KEY:        ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET:     ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN:        ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_CLIENT_SECRET:       ${{ secrets.TWITTER_CLIENT_SECRET }}
        run: python -m src.reply_handler

      - name: 💾 حفظ سجل الردود
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reply-log-${{ github.run_number }}
          path: |
            logs/bot.log
            logs/replied_ids.json
            logs/last_mention_id.json
          retention-days: 14
